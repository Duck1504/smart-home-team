services:
  mysql:
    image: mysql:8.4
    container_name: smarthome-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: smarthome_store
      MYSQL_USER: smarthome
      MYSQL_PASSWORD: smarthome123
      MYSQL_ROOT_PASSWORD: root123
      TZ: Asia/Ho_Chi_Minh
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - smarthome_mysql_data:/var/lib/mysql

volumes:
  smarthome_mysql_data:
