# Activate with SPRING_PROFILES_ACTIVE=mysql or
# mvn spring-boot:run -Dspring-boot.run.profiles=mysql
spring.datasource.url=${APP_DATASOURCE_URL:jdbc:mysql://localhost:3306/smarthome_store?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true&useSSL=false}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${APP_DATASOURCE_USERNAME:smarthome}
spring.datasource.password=${APP_DATASOURCE_PASSWORD:smarthome123}

spring.jpa.database-platform=${APP_JPA_DATABASE_PLATFORM:org.hibernate.dialect.MySQLDialect}
spring.h2.console.enabled=false
