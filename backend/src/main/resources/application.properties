# Server
server.port=8080

# Default datasource: local embedded file DB so the app runs immediately.
# Override with APP_DATASOURCE_* env vars if you want to use MySQL.
spring.datasource.url=${APP_DATASOURCE_URL:jdbc:h2:file:./data/smarthome-store;MODE=MySQL;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE}
spring.datasource.driver-class-name=${APP_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${APP_DATASOURCE_USERNAME:sa}
spring.datasource.password=${APP_DATASOURCE_PASSWORD:}

# For development only (creates/updates schema automatically)
spring.jpa.hibernate.ddl-auto=${APP_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.database-platform=${APP_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=${APP_JPA_TIME_ZONE:Asia/Ho_Chi_Minh}
spring.jpa.open-in-view=false

# H2 console for local debugging
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT
app.jwt.secret=CHANGE_ME_TO_A_LONG_RANDOM_SECRET
app.jwt.expirationMs=86400000

# CORS - allow frontend during development
app.cors.allowedOrigin=*
