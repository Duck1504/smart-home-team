<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quên mật khẩu</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-row">
      <a class="brand" href="./index.html">
        <span class="brand__mark">SH</span>
        <span class="brand__copy">
          <strong>Smart Home Store</strong>
          <small>Thiết bị thông minh cho gia đình</small>
        </span>
      </a>
      <nav class="header-nav">
        <span id="userGreeting" class="header-note">Mua sắm nhanh</span>
        <a id="adminLink" href="./admin-stats.html" hidden>Quản trị</a>
        <a href="./cart.html">Giỏ hàng <span id="cartCountBadge" class="nav-badge">0</span></a>
        <a id="authLink" href="./login.html">Đăng nhập</a>
      </nav>
    </div>
  </header>

  <main class="container page auth-page">
    <section class="panel panel--accent intro-panel">
      <p class="eyebrow">Quên mật khẩu</p>
      <h1>Khôi phục lại mật khẩu để tiếp tục sử dụng hệ thống.</h1>
      <p class="hero__text">Bản demo này cho phép đặt lại mật khẩu trực tiếp theo tên đăng nhập.</p>
    </section>

    <section class="auth-single">
      <section class="panel">
        <form id="forgotForm" class="form">
          <label class="form-field">
            <span>Tên đăng nhập</span>
            <input id="forgotUsername" type="text" minlength="3" maxlength="50" required />
          </label>
          <label class="form-field">
            <span>Mật khẩu mới</span>
            <input id="forgotPassword" type="password" minlength="6" maxlength="100" required />
          </label>
          <label class="form-field">
            <span>Nhập lại mật khẩu mới</span>
            <input id="forgotPasswordConfirm" type="password" minlength="6" maxlength="100" required />
          </label>
          <button class="btn btn--block" type="submit">Cập nhật mật khẩu</button>
        </form>
        <div id="forgotStatus" class="status" aria-live="polite" hidden></div>
        <div class="auth-links">
          <a href="./login.html">Quay lại đăng nhập</a>
          <a href="./register.html">Tạo tài khoản mới</a>
        </div>
      </section>
    </section>
  </main>

  <script type="module" src="./js/forgot-password.js"></script>
</body>
</html>
